<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚大智能內部系統</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f4f7f6; }
        .sidebar { width: 240px; background-color: #002d72; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { padding: 20px; font-size: 1.2em; background: rgba(0,0,0,0.2); margin: 0; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar ul li a { padding: 15px 20px; display: block; color: #ddd; text-decoration: none; border-bottom: 1px solid #004a99; }
        .sidebar ul li a:hover { background: #004a99; color: white; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .top-nav { height: 60px; background: white; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .content-area { padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>HARTECH 系統</h2>
    <ul>
        <li><a href="#">首頁</a></li>
        <li><a href="/chat01">內部聊天室</a></li>
        <li><a href="#">考勤報表</a></li>
        <li><a href="#" onclick="logout()">登出系統</a></li>
    </ul>
</aside>

<div class="main-content">
    <header class="top-nav">
        <div>歡迎回來，員工編號: <span id="empIdDisplay">載入中...</span></div>
        <button onclick="logout()">登出</button>
    </header>
    
    <main class="content-area">
        <h1>儀表板</h1>
        <p>請從左側選單選擇功能。</p>
    </main>
</div>

<script>
    // 嚴謹的初始化函式
    async function init() {
        const token = localStorage.getItem('auth_token');
        
        // 1. 若完全沒有 token，強制轉址至登入頁
        if (!token) {
            window.location.replace('/index.html');
            return;
        }

        try {
            // 2. 驗證 Token 有效性
            const res = await fetch('/api/auth/verify', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) {
                console.warn("Token 無效或過期，清除並轉址");
                localStorage.removeItem('auth_token');
                window.location.replace('/index.html');
            } else {
                const data = await res.json();
                document.getElementById('empIdDisplay').innerText = data.employee_id || '未知用戶';
            }
        } catch (error) {
            console.error('驗證過程中發生網路錯誤:', error);
            // 若網路錯誤，建議維持原狀或轉址，視您的需求而定
            window.location.replace('/index.html');
        }
    }

    // 登出功能
    function logout() {
        localStorage.removeItem('auth_token');
        window.location.replace('/index.html');
    }

    // 頁面載入時執行
    init();
</script>

</body>
</html>
