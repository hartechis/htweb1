<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚大智能系統</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f4f7f6; }
        
        /* 側邊選單樣式 */
        .sidebar { width: 240px; background-color: #002d72; color: white; display: flex; flex-direction: column; transition: all 0.3s ease; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar ul li a { padding: 15px 20px; display: block; color: #ddd; text-decoration: none; border-bottom: 1px solid #004a99; }
        .sidebar ul li a:hover { background: #004a99; color: white; }
        
        /* 主內容區域 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-nav { height: 60px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; padding: 0 20px; }
        
        /* 漢堡選單按鈕 */
        .menu-toggle { display: none; font-size: 28px; cursor: pointer; margin-right: 15px; }

        /* 手機版 (寬度 < 768px) */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { 
                position: absolute; 
                left: -240px; /* 預設隱藏在左側外 */
                height: 100%;
                z-index: 1000;
            }
            .sidebar.active { left: 0; } /* 點擊後顯示 */
        }
    </style>
</head>
<body>

<!-- 側邊選單 -->
<aside class="sidebar" id="sidebar">
    <img src="assets/harechLOGON3.png" alt="HARTECH Logo" style="width:100%; height:auto; padding:10px; box-sizing:border-box;">   
    <ul>
        <li><a href="/dashboard.html">首頁</a></li>
        <li><a href="/chat01">內部聊天室</a></li>
        <li><a href="#">線上填報請出差</a></li>
        <li><a href="/form">自製表單</a></li>
        <li><a href="#" onclick="logout()">登出系統</a></li>
    </ul>
</aside>

<!-- 主內容 -->
<div class="main-content">
    <header class="top-nav">
        <span class="menu-toggle" onclick="toggleMenu()">☰</span>
        <div style="flex: 1; display: flex; justify-content: space-between; align-items: center;">
            <span>歡迎回來，員工: <span id="empIdDisplay">載入中...</span></span>
            <button onclick="logout()">登出</button>
        </div>
    </header>
    
    <main style="padding: 20px;">
        <h1>儀表板</h1>
        <p>請從左側選單選擇功能。</p>
    </main>
</div>

<script>
    // 切換選單顯示狀態
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // 初始化驗證函式
    async function init() {
        const token = localStorage.getItem('auth_token');
        if (!token) {
            window.location.replace('/index.html');
            return;
        }

        try {
            const res = await fetch('/api/auth/verify', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) {
                logout();
            } else {
                const data = await res.json();
                localStorage.setItem('empId', data.employee_id);
                localStorage.setItem('empName', data.name);
                
                const display = document.getElementById('empIdDisplay');
                if (data.employee_id && data.name) {
                    display.innerText = `${data.employee_id} ${data.name}`;
                } else {
                    display.innerText = "資料讀取異常";
                }
            }
        } catch (error) {
            console.error('驗證失敗:', error);
            window.location.replace('/index.html');
        }
    }

    function logout() {
        localStorage.clear();
        window.location.replace('/index.html');
    }

    init();
</script>

</body>
</html>
