<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自製表單 | 聚大智能系統</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <style>
        body { visibility: hidden; }
        .view-section { display: none; }
        .active-view { display: block; }
    </style>

    <script src="/assets/js/auth_check.js"></script>
</head>
<body>

<header class="top-nav">
    <div class="logo-container">
        <a href="/dashboard/"><img src="/assets/harechLOGON3.png" alt="Logo" style="height:40px;"></a>
    </div>
    <div class="nav-info">
        <span>歡迎回來，<span id="empIdDisplay">載入中...</span></span>
        <button onclick="localStorage.clear(); window.location.replace('/index.html');">登出</button>
    </div>
</header>

<div class="wrapper">
    <aside class="sidebar" id="sidebar">
        <ul>
            <li><a href="/dashboard/">回到首頁</a></li>
            <li><a href="javascript:void(0);" onclick="switchView('form')">訂餐表單</a></li>
            <li><a href="javascript:void(0);" onclick="switchView('query')">查詢紀錄</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div id="view-form" class="view-section active-view">
            <h2>餐點訂購表單</h2>
            <hr>
            <div style="max-width: 400px;">
                <label>工號：<input type="text" id="formEmpId" readonly></label>
                <label>姓名：<input type="text" id="formEmpName" readonly></label>
                <label>餐點：<input type="text" id="meal" placeholder="例如：排骨飯"></label>
                <label>數量：<input type="number" id="qty" value="1"></label>
                <button onclick="submitOrder()">送出訂單</button>
            </div>
        </div>

        <div id="view-query" class="view-section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>歷史訂單查詢</h2>
                <button onclick="loadOrders()">重新整理</button>
            </div>
            <table border="1" style="width:100%; border-collapse:collapse; margin-top:15px;">
                <thead>
                    <tr><th>工號</th><th>姓名</th><th>餐點</th><th>數量</th></tr>
                </thead>
                <tbody id="orderTableBody"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
    // 切換頁面視圖
    function switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
        document.getElementById('view-' + viewName).classList.add('active-view');
        if (viewName === 'query') loadOrders();
    }

    // 提交表單資料
    async function submitOrder() {
        const payload = {
            empId: document.getElementById('formEmpId').value,
            name: document.getElementById('formEmpName').value,
            meal: document.getElementById('meal').value,
            qty: document.getElementById('qty').value
        };

        const res = await fetch('/api/form', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            alert('訂單已送出！');
            switchView('query');
        } else {
            alert('送出失敗，請檢查網路連線。');
        }
    }

    // 讀取歷史訂單
    async function loadOrders() {
        const res = await fetch('/api/form');
        const list = await res.json();
        const tbody = document.getElementById('orderTableBody');
        tbody.innerHTML = list.map(item => `
            <tr>
                <td>${item.empId}</td>
                <td>${item.name}</td>
                <td>${item.meal}</td>
                <td>${item.qty}</td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
