<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天管理中心 | 聚大智能系統</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        body { visibility: hidden; }
    </style>
    <script src="/assets/js/auth_check.js"></script>
</head>
<body>

<header class="top-nav">
    <div class="logo-container">
        <a href="/dashboard/"><img src="/assets/harechLOGON3.png" alt="Logo" style="height:40px;"></a>
    </div>
    <div class="nav-info">
        <span>歡迎回來，<span id="empIdDisplay">載入中...</span></span>
        <button onclick="logout()">登出</button>
    </div>
</header>

<div class="wrapper">
    <aside class="sidebar" id="sidebar">
        <ul>
            <li><a href="/dashboard/">⬅ 回到首頁</a></li>
            <li><a href="javascript:void(0);" onclick="scrollToSection('new-room')">新建聊天室</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <h2>聊天管理中心</h2>
        <section id="new-room" style="margin-bottom: 40px;">
            <h3>新建聊天室</h3>
            <div style="display: flex; gap: 10px; max-width: 400px;">
                <input type="text" id="newRoomId" placeholder="輸入房間代號" style="padding: 10px; flex: 1; border: 1px solid #ccc; border-radius: 4px;">
                <button onclick="goToRoom()" style="padding: 10px 20px; background: #002d72; color: white; border: none; border-radius: 4px; cursor: pointer;">進入</button>
            </div>
        </section>
    </main>
</div>

<script>
    // 登出函式
    function logout() { 
        localStorage.clear(); 
        window.location.replace('/index.html'); 
    }

    // 進入房間邏輯
    function goToRoom() {
        const roomId = document.getElementById('newRoomId').value.trim();
        if (roomId) {
            window.location.href = `/dashboard/chat01/?rm=${encodeURIComponent(roomId)}`;
        } else {
            alert("請輸入房間代號");
        }
    }

    // 為了保險起見，強制讓 body 在驗證完後顯示
    // 如果 auth_check.js 沒設定好，這行保證頁面不會一片空白
    window.addEventListener('load', () => {
        document.body.style.visibility = 'visible';
    });
</script>

</body>
</html>
