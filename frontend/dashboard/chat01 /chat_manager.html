<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>內部傳訊管理 | 聚大智能系統</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        body { visibility: hidden; }
        .room-item { cursor: pointer; padding: 15px; border-bottom: 1px solid #eee; background: white; margin-bottom: 5px; border-radius: 8px; }
        .room-item:hover { background: #f0f0f0; }
    </style>
    <script src="/assets/js/auth_check.js"></script>
</head>
<body>

<header class="top-nav">
    <span class="hamburger" onclick="toggleSidebar()">☰</span>
    <div class="logo-container">
        <a href="/dashboard/"><img src="/assets/harechLOGON3.png" alt="Logo" style="height:40px;"></a>
    </div>
    <div class="nav-info">
        <button onclick="logout()">登出</button>
    </div>
</header>

<div class="wrapper">
    <aside class="sidebar" id="sidebar">
        <ul>
            <li><a href="/dashboard/">回到首頁</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <h2>聊天管理中心</h2>
        
        <section style="margin-bottom: 30px;">
            <h3>新建聊天室</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="newRoomId" placeholder="輸入房間代號 (例如: project-a)" style="padding: 8px; flex: 1;">
                <button onclick="goToRoom()">建立/加入</button>
            </div>
        </section>

        <section>
            <h3>現有房間列表</h3>
            <div id="roomList">載入中...</div>
        </section>
    </main>
</div>

<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    
    // 跳轉到指定房間
    function goToRoom() {
        const roomId = document.getElementById('newRoomId').value.trim();
        if (roomId) window.location.href = `/chat01.html?rm=${encodeURIComponent(roomId)}`;
    }

    // 載入房間列表
    async function loadRooms() {
        try {
            const res = await fetch('/api/chat/rooms');
            const rooms = await res.json();
            const container = document.getElementById('roomList');
            if (rooms.length === 0) {
                container.innerHTML = "目前沒有聊天記錄。";
                return;
            }
            container.innerHTML = rooms.map(r => `
                <div class="room-item" onclick="window.location.href='/chat01.html?rm=${encodeURIComponent(r.room)}'">
                    <strong>房間代號: ${r.room}</strong>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('roomList').innerHTML = "無法載入房間。";
        }
    }

    loadRooms();
</script>

</body>
</html>
