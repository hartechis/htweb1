<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚大智能系統</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <style>body { visibility: hidden; }</style>
    
    <script src="/assets/js/auth_check.js"></script>
</head>
<body>

<header class="top-nav">
    <span class="hamburger" onclick="toggleSidebar()">☰</span>
    
    <div class="logo-container">
        <a href="/dashboard/">
            <img src="/assets/harechLOGON3.png" alt="HARTECH Logo" style="height:40px; border: none;">
        </a>
    </div>
    
    <div class="nav-info">
         <span>歡迎回來，<span id="empIdDisplay">載入中...</span></span>
        <button onclick="logout()">登出</button>
    </div>
</header>

<div class="wrapper">
    <aside class="sidebar" id="sidebar">
        <ul>
            <li><a href="/dashboard/form/">餐點訂購表單</a></li>
            <li><a href="/dashboard/chat01/">內部傳訊</a></li>
            <li><a href="#">線上填報請出差</a></li>
            <li><a href="javascript:void(0);" onclick="logout()">登出系統</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <h1>儀表板</h1>
        <p>請從左側選單選擇功能。</p>
    </main>
</div>

<script>
    // 漢堡選單切換 (對應 style.css 中的 .sidebar.active)
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // 登出函式 (供按鈕呼叫)
    function logout() {
        localStorage.clear();
        window.location.replace('/index.html');
    }

    // 聊天室導向邏輯
    function openChatRoom() {
        const empId = localStorage.getItem('empId');
        const empName = localStorage.getItem('empName');
        const role = 'admin'; 
        window.location.href = `/chat01.html?rm=general&i=${role}`;
    }
</script>

</body>
</html>
