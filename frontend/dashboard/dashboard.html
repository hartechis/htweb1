<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚大智能系統</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #f4f7f6; }
        
        /* 頂部導覽列 (全寬) */
        .top-nav { height: 70px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; padding: 0 20px; z-index: 1001; }
        .logo-container { width: 200px; display: flex; align-items: center; }
        .nav-info { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
        .menu-toggle { display: none; font-size: 28px; cursor: pointer; margin-right: 15px; }

        /* 下方容器 */
        .wrapper { display: flex; flex: 1; overflow: hidden; }

        /* 側邊選單 */
        .sidebar { width: 33.33%; max-width: 300px; background-color: #002d72; color: white; transition: all 0.3s ease; overflow-y: auto; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar ul li a { padding: 15px 20px; display: block; color: #ddd; text-decoration: none; border-bottom: 1px solid #004a99; }
        .sidebar ul li a:hover { background: #004a99; color: white; }
        
        /* 主內容區域 */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; }

        /* 手機版響應式 */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            /* 隱藏歡迎文字，只留下登出按鈕 */
           .nav-info span {display: none; }
            .sidebar { 
                position: absolute; 
                left: -100%; 
                width: 240px;
                height: 100%;
                z-index: 1000;
            }
            .sidebar.active { left: 0; }
        }
    </style>
</head>
<body>

<header class="top-nav">
    <span class="menu-toggle" onclick="toggleMenu()">☰</span>
    <div class="logo-container">
        <img src="assets/harechLOGON3.png" alt="HARTECH Logo" style="height:40px;">
    </div>
    <div class="nav-info">
        <span>歡迎回來，員工: <span id="empIdDisplay">載入中...</span></span>
        <button onclick="logout()">登出</button>
    </div>
</header>

<div class="wrapper">
    <aside class="sidebar" id="sidebar">
        <ul>
            <li><a href="/dashboard.html">首頁</a></li>
            <li><a href="javascript:void(0);" onclick="openChatRoom()">內部聊天室</a></li>
            <li><a href="#">線上填報請出差</a></li>
            <li><a href="/form">自製表單</a></li>
            <li><a href="#" onclick="logout()">登出系統</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <h1>儀表板</h1>
        <p>請從左側選單選擇功能。</p>
    </main>
</div>
    
<script>
    // 切換側邊選單
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // 聊天室導向邏輯
    function openChatRoom() {
        const empId = localStorage.getItem('empId');
        const empName = localStorage.getItem('empName');
        
        // 預設房間設定：可根據您的需求改為從資料庫讀取，或預設為 'general'
        const roomName = 'general'; 
        
        // 設定身分：內部員工帶入 admin，外部人員帶入 client
        // 此處可依照員工 ID 或類型動態判斷
        const role = 'admin'; 

        // 導向聊天室，參數 rm 為房間名稱，i 為身分
        window.location.href = `/chat01.html?rm=${encodeURIComponent(roomName)}&i=${role}`;
    }

    // 初始化驗證與 UI 更新
    async function init() {
        const token = localStorage.getItem('auth_token');
        if (!token) {
            window.location.replace('/index.html');
            return;
        }

        try {
            const res = await fetch('/api/auth/verify', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) {
                logout();
            } else {
                const data = await res.json();
                // 儲存資訊至 LocalStorage，供其他頁面使用
                localStorage.setItem('empId', data.employee_id);
                localStorage.setItem('empName', data.name);
                
                const display = document.getElementById('empIdDisplay');
                if (data.employee_id && data.name) {
                    display.innerText = `${data.employee_id} ${data.name}`;
                } else {
                    display.innerText = "資料讀取異常";
                }
            }
        } catch (error) {
            console.error('驗證失敗:', error);
            window.location.replace('/index.html');
        }
    }

    // 登出函式
    function logout() {
        localStorage.clear();
        window.location.replace('/index.html');
    }

    // 頁面載入時執行初始化
    init();
</script>

</body>
</html>
