<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/assets/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚大智能系統</title>    
</head>
<body>

<header class="top-nav">
    <span class="menu-toggle" onclick="toggleMenu()">☰</span>
    <div class="logo-container">
        <img src="assets/harechLOGON3.png" alt="HARTECH Logo" style="height:40px;">
    </div>
    <div class="nav-info">
        <span>歡迎回來，員工: <span id="empIdDisplay">載入中...</span></span>
        <button onclick="logout()">登出</button>
    </div>
</header>

<div class="wrapper">
    <aside class="sidebar" id="sidebar">
        <ul>
            <li><a href="/dashboard.html">首頁</a></li>
            <li><a href="javascript:void(0);" onclick="openChatRoom()">內部聊天室</a></li>
            <li><a href="#">線上填報請出差</a></li>
            <li><a href="/form">自製表單</a></li>
            <li><a href="#" onclick="logout()">登出系統</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <h1>儀表板</h1>
        <p>請從左側選單選擇功能。</p>
    </main>
</div>
    
<script>
    // 切換側邊選單
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // 聊天室導向邏輯
    function openChatRoom() {
        const empId = localStorage.getItem('empId');
        const empName = localStorage.getItem('empName');
        
        // 預設房間設定：可根據您的需求改為從資料庫讀取，或預設為 'general'
        const roomName = 'general'; 
        
        // 設定身分：內部員工帶入 admin，外部人員帶入 client
        // 此處可依照員工 ID 或類型動態判斷
        const role = 'admin'; 

        // 導向聊天室，參數 rm 為房間名稱，i 為身分
        window.location.href = `/chat01.html?rm=${encodeURIComponent(roomName)}&i=${role}`;
    }

    // 初始化驗證與 UI 更新
    async function init() {
        const token = localStorage.getItem('auth_token');
        if (!token) {
            window.location.replace('/index.html');
            return;
        }

        try {
            const res = await fetch('/api/auth/verify', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) {
                logout();
            } else {
                const data = await res.json();
                // 儲存資訊至 LocalStorage，供其他頁面使用
                localStorage.setItem('empId', data.employee_id);
                localStorage.setItem('empName', data.name);
                
                const display = document.getElementById('empIdDisplay');
                if (data.employee_id && data.name) {
                    display.innerText = `${data.employee_id} ${data.name}`;
                } else {
                    display.innerText = "資料讀取異常";
                }
            }
        } catch (error) {
            console.error('驗證失敗:', error);
            window.location.replace('/index.html');
        }
    }

    // 登出函式
    function logout() {
        localStorage.clear();
        window.location.replace('/index.html');
    }

    // 頁面載入時執行初始化
    init();
</script>

</body>
</html>
