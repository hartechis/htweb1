<div class="card">
    <h2 id="title">設定密碼</h2>
    
    <div id="oldPwdGroup" class="input-group" style="display:none;">
        <label>舊密碼</label>
        <input type="password" id="oldPwd">
    </div>

    <div class="input-group">
        <label>新密碼</label>
        <input type="password" id="newPwd">
    </div>
    
    <button onclick="submitPassword()">確認設定</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const mode = params.get('mode'); // 'first' 或 'reset'

// 根據模式調整 UI
if (mode === 'reset') {
    document.getElementById('oldPwdGroup').style.display = 'block';
    document.getElementById('title').innerText = '重設密碼';
}

async function submitPassword() {
    // 根據 mode 發送不同的 API 參數給後端
    const payload = {
        employee_id: params.get('empId'),
        new_password: document.getElementById('newPwd').value,
        old_password: mode === 'reset' ? document.getElementById('oldPwd').value : null
    };
    // ... 執行 fetch ...
}
</script>
