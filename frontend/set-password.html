<!-- frontend/set-password.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>首次登入 - 設定密碼</title>
    <style>
        .card { width: 300px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        #msg { color: red; margin: 10px 0; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>設定您的密碼</h2>
        <input type="password" id="newPwd" placeholder="請輸入新密碼"><br>
        <button onclick="savePassword()">確認設定</button>
        <div id="msg"></div>
    </div>
    <script>
        async function savePassword() {
            const urlParams = new URLSearchParams(window.location.search);
            const employee_id = urlParams.get('empId');
            const new_password = document.getElementById('newPwd').value;
            
            const res = await fetch('/api/auth/set-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ employee_id, new_password })
            });
            
            if (res.ok) {
                alert("密碼設定成功，請重新登入");
                window.location.href = '/index.html';
            } else {
                document.getElementById('msg').innerText = "設定失敗，請稍後再試";
                document.getElementById('msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
