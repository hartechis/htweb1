<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密碼設定</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #002d72; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
         button { width: 100%; padding: 14px; margin-top: 10px; background-color: #004a99; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        #msgBox { color: #ff4d4f; font-size: 0.85em; margin-top: 10px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">設定密碼</h2>
    
    <div class="input-group">
        <label>員工工號</label>
        <input type="text" id="empId" placeholder="請輸入您的工號">
    </div>

    <div id="oldPwdGroup" class="input-group" style="display:none;">
        <label>舊密碼</label>
        <input type="password" id="oldPwd" placeholder="請輸入舊密碼">
    </div>

    <div class="input-group">
        <label>新密碼</label>
        <input type="password" id="newPwd" placeholder="請輸入6位英數字密碼" maxlength="6">
    </div>
    
    <button onclick="submitPassword()">確認送出</button>
    <div id="msgBox"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    const urlEmpId = params.get('empId');
    const empIdField = document.getElementById('empId');

    if (mode === 'reset') {
        document.getElementById('oldPwdGroup').style.display = 'block';
        document.getElementById('title').innerText = '重設密碼';
    } else if (mode === 'first' && urlEmpId) {
        empIdField.value = urlEmpId;
        empIdField.readOnly = true;
    }

    async function submitPassword() {
        const newPwd = document.getElementById('newPwd').value;
        const msgBox = document.getElementById('msgBox');

        // 驗證規則：需同時包含數字與英文，且長度必須為6
  
    const passwordRegex = /^(?=.*[0-9])(?=.*[a-zA-Z]).{6}$/;

    if (!passwordRegex.test(newPwd)) {
        showMsg("密碼格式錯誤：請輸入6位英數字");
        return;
    }

        const payload = {
            employee_id: empIdField.value,
            new_password: newPwd,
            old_password: mode === 'reset' ? document.getElementById('oldPwd').value : null,
            mode: mode
        };

        try {
            const res = await fetch('/api/auth/set-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (res.status === 200) {
                showMsg("密碼已重設成功，請重新登入");
                window.location.href = '/index.html';
                 }, 2000); // 2 秒後跳轉
            } else {
                showMsg(data.error || "設定失敗");
            }
        } catch (err) {
            showMsg("伺服器連線錯誤");
        }
    }

    function showMsg(text) {
        const msgBox = document.getElementById('msgBox');
        msgBox.innerText = text;
        msgBox.style.display = 'block'; // 確保它是可見的
    }
</script>
</body>
</html>
