<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>即時通訊平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pb-safe { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px)); }
        #chatBox::-webkit-scrollbar { width: 4px; }
        #chatBox::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }
        
        .touch-target {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        input[type="search"]::-webkit-search-decoration,
        input[type="search"]::-webkit-search-cancel-button,
        input[type="search"]::-webkit-search-results-button,
        input[type="search"]::-webkit-search-results-decoration { display: none; }
    </style>
</head>
<body class="bg-slate-900 h-[100dvh] w-full flex flex-col max-w-md mx-auto shadow-2xl overflow-hidden text-gray-800">

    <header class="bg-[#1e2a38] text-white p-4 font-bold shrink-0 shadow-md flex justify-between items-center">
        <span>☁️ 雲端通訊：<span id="roomName"></span></span>
        <span class="text-xs text-gray-400">往上滾動可查歷史</span>
    </header>
    
    <main id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-4 bg-[#7493a7] overscroll-contain opacity-0 transition-opacity duration-150">
    </main>
    
    <footer class="bg-white p-3 px-4 border-t flex flex-col gap-2 shrink-0 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] pb-safe w-full box-border">
        <div id="uploadStatus" class="hidden text-xs text-blue-600 font-medium animate-pulse"></div>
        
        <form action="javascript:void(0);" autocomplete="off" class="flex gap-2 items-center w-full">
            <label class="cursor-pointer bg-gray-100 hover:bg-gray-200 p-2.5 rounded-lg text-xl transition-colors shrink-0 select-none">
                📷<input type="file" id="fileInput" accept="*/*" class="hidden" multiple>
            </label>
            
            <input type="search" id="inputBar" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" class="min-w-0 flex-1 border border-gray-300 rounded-lg px-3 py-2 text-base focus:outline-none focus:border-emerald-600 transition-colors" placeholder="內容...">
            
            <button id="sendBtn" type="button" class="w-16 bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white py-2 rounded-lg font-medium transition-all shrink-0 text-center">
                發送
            </button>
        </form>
    </footer>

    <div id="imageModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center cursor-pointer z-50 p-4 touch-target" onclick="closeZoom()">
        <img id="modalImg" class="max-w-full max-h-full rounded-lg shadow-2xl transition-transform duration-200 object-contain" src="">
    </div>

    <div id="fileModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl space-y-4">
            <div class="flex items-center gap-3 border-b pb-3">
                <span class="text-2xl">📁</span>
                <div class="flex-1 min-w-0">
                    <h3 class="text-sm font-semibold text-gray-500">檔案確認提示</h3>
                    <p id="popFileName" class="text-base font-bold text-gray-900 truncate mt-0.5">檔案名稱.xlsx</p>
                </div>
            </div>
            <p class="text-sm text-gray-600 leading-relaxed">請選擇您對此檔案執行的動作。若點選開啟，系統將嘗試於瀏覽器新分頁中直接預覽內容。</p>
            
            <div class="grid grid-cols-2 gap-2.5 pt-2">
                <button id="popOpenBtn" class="bg-slate-100 hover:bg-slate-200 text-slate-800 font-medium py-2.5 rounded-xl transition-colors text-sm">
                    直接開啟
                </button>
                <button id="popDownloadBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-xl transition-all shadow-sm shadow-emerald-600/20 text-sm">
                    確認下載
                </button>
            </div>
            <button onclick="closeFileModal()" class="w-full text-center text-xs text-gray-400 hover:text-gray-600 pt-1 transition-colors block">
                取消
            </button>
        </div>
    </div>

    <script>
        const API_BASE = "https://pg.hartechis.workers.dev";
        const params = new URLSearchParams(window.location.search);
        const rm = params.get('rm') || 'default';
        const myRole = params.get('i') === 'admin' ? 'admin' : 'client';
        
        document.getElementById('roomName').innerText = rm;

        let allMessages = [];       
        let displayedCount = 10;
        let isFirstRender = true;
        let es = null; 

        function formatTime(ts) {
            const date = new Date(ts);
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        function formatDateLabel(ts) {
            const date = new Date(ts);
            return `${date.getFullYear()}年${String(date.getMonth() + 1).padStart(2, '0')}月${String(date.getDate()).padStart(2, '0')}日`;
        }

        function appendMessageToDOM(data) {
            const chatBox = document.getElementById('chatBox');
            const msgTimestamp = data.timestamp || Date.now();
            const isMe = data.sender === myRole;
            const displayName = isMe ? '發訊' : '來訊';
            const timeStr = formatTime(msgTimestamp);
            
            const msgRow = document.createElement('div');
            msgRow.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} space-y-0.5 w-full`;
            const nameSpan = document.createElement('span');
            nameSpan.className = "text-xs text-white/80 px-1 select-none";
            nameSpan.innerText = displayName;
            msgRow.appendChild(nameSpan);

            const contentRow = document.createElement('div');
            contentRow.className = `flex items-end gap-1.5 max-w-[85%] ${isMe ? 'flex-row-reverse' : 'flex-row'}`;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `px-4 py-2.5 rounded-2xl shadow-sm break-all text-base ${
                isMe ? 'bg-emerald-600 text-white rounded-tr-none' : 'bg-white text-gray-800 rounded-tl-none'
            }`;
            if (data.type === 'text') {
                bubbleDiv.innerText = data.content;
            } else if (data.type === 'image') {
                bubbleDiv.className = `p-1 rounded-xl shadow-sm border overflow-hidden cursor-zoom-in touch-target ${isMe ? 'bg-emerald-600/30 border-emerald-500' : 'bg-white border-gray-200'}`;
                bubbleDiv.innerHTML = `<img src="${data.content}" class="max-w-[180px] max-h-[180px] object-cover rounded-lg block" onclick="zoom('${data.content}')">`;
            } else if (data.type === 'file') {
                let showName = "下載檔案";
                let fileUrl = data.content;
                try {
                    const fileInfo = JSON.parse(data.content);
                    showName = fileInfo.name;
                    fileUrl = fileInfo.url;
                } catch(e) {}
                
                const fileSpan = document.createElement('span');
                fileSpan.className = "flex items-center gap-2 font-medium underline cursor-pointer hover:opacity-80 break-all transition-opacity";
                fileSpan.innerHTML = `📁 <span>${showName}</span>`;
                fileSpan.onclick = () => openFileModal(showName, fileUrl);
                
                bubbleDiv.appendChild(fileSpan);
            }

            const timeSpan = document.createElement('span');
            timeSpan.className = "text-[10px] text-white/70 select-none shrink-0 pb-0.5";
            timeSpan.innerText = timeStr;

            contentRow.appendChild(bubbleDiv);
            contentRow.appendChild(timeSpan);
            msgRow.appendChild(contentRow);

            chatBox.appendChild(msgRow);
        }

        function openFileModal(name, url) {
            document.getElementById('popFileName').innerText = name;
            document.getElementById('popOpenBtn').onclick = () => {
                window.open(url, '_blank');
                closeFileModal();
            };
            
            document.getElementById('popDownloadBtn').onclick = () => {
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', name);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                closeFileModal();
            };
            
            document.getElementById('fileModal').classList.remove('hidden');
        }

        function closeFileModal() {
            document.getElementById('fileModal').classList.add('hidden');
        }

        function renderChatView(maintainScroll = false) {
            const chatBox = document.getElementById('chatBox');
            const oldScrollHeight = chatBox.scrollHeight;
            const oldScrollTop = chatBox.scrollTop;

            chatBox.innerHTML = '';
            const visibleMessages = allMessages; 
            let lastMsgDate = null;

            visibleMessages.forEach(msg => {
                const msgDateStr = formatDateLabel(msg.timestamp || Date.now());
                
                if (lastMsgDate !== msgDateStr) {
                    const dateHtml = document.createElement('div');
                    dateHtml.className = "flex justify-center my-4 select-none w-full";
                    dateHtml.innerHTML = `<span class="bg-black/10 text-white text-xs px-3 py-1 rounded-full shadow-sm">${msgDateStr}</span>`;
                    chatBox.appendChild(dateHtml);
                    lastMsgDate = msgDateStr;
                }
                
                appendMessageToDOM(msg);
            });

            if (isFirstRender) {
                chatBox.scrollTop = chatBox.scrollHeight;
                setTimeout(() => {
                    chatBox.scrollTop = chatBox.scrollHeight;
                    chatBox.classList.remove('opacity-0');
                    isFirstRender = false;
                }, 50);
            } else if (maintainScroll) {
                chatBox.scrollTop = chatBox.scrollHeight - oldScrollHeight + oldScrollTop;
            } else {
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function initSSE(maintainScroll = false) {
            if (es) es.close(); 

            es = new EventSource(`${API_BASE}/chat01?rm=${encodeURIComponent(rm)}&limit=${displayedCount}`, { withCredentials: true });
            
            es.addEventListener('history', e => {
                const msgs = JSON.parse(e.data);
                const sorted = msgs.sort((a, b) => a.timestamp - b.timestamp);
                allMessages = sorted.map(m => ({
                    sender: m.sender || m.user,
                    type: m.type || 'text',
                    content: m.content || m.text,
                    timestamp: m.timestamp
                }));
                renderChatView(maintainScroll);
            });

            es.addEventListener('message', e => {
                const data = JSON.parse(e.data);
                if (data.sender === myRole) return; 
                allMessages.push(data);
                renderChatView(false);
            });
        }

        document.getElementById('chatBox').addEventListener('scroll', (e) => {
            const target = e.target;
            if (target.scrollTop <= 15) {
                displayedCount += 15;   
                initSSE(true);          
            }
        });

        function zoom(url) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = url;
            modal.classList.remove('hidden');
        }

        function closeZoom() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        async function commitAndSend(msgType, finalContent) {
            const rawMsg = { 
                sender: myRole, 
                type: msgType, 
                content: finalContent, 
                timestamp: Date.now() 
            };
            allMessages.push(rawMsg);
            renderChatView(false);

            await fetch(`${API_BASE}/chat01?rm=${encodeURIComponent(rm)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(rawMsg)
            });
        }

        const handleTextSend = async () => {
            const input = document.getElementById('inputBar');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            await commitAndSend('text', text);
        };

        document.getElementById('sendBtn').onclick = handleTextSend;
        document.getElementById('inputBar').onkeydown = async (e) => { if (e.key === 'Enter') handleTextSend(); };
        
        async function processFileUpload(files) {
            if (!files || files.length === 0) return;
            const msgInput = document.getElementById('inputBar');
            const uploadStatus = document.getElementById('uploadStatus');

            uploadStatus.innerText = `⏳ 正在處理多筆檔案上傳中 (共 ${files.length} 個檔案)...`;
            uploadStatus.classList.remove('hidden');
            msgInput.disabled = true;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.size > 50 * 1024 * 1024) {
                    alert(`檔案 [${file.name}] 超過 50MB，已跳過。`);
                    continue;
                }

                try {
                    const isImage = file.type.startsWith('image/');
                    const msgType = isImage ? 'image' : 'file';

                    const uploadResponse = await fetch(`${API_BASE}/chat01/upload`, { 
                        method: 'POST',
                        headers: {
                            'Content-Type': file.type,
                            'X-Filename': encodeURIComponent(file.name)
                        },
                        body: file
                    });
                    if (!uploadResponse.ok) throw new Error('伺服器儲存失敗');
                    const uploadResult = await uploadResponse.json();

                    let finalContent = uploadResult.url;
                    if (msgType === 'file') {
                        finalContent = JSON.stringify({ url: uploadResult.url, name: uploadResult.name });
                    }

                    await commitAndSend(msgType, finalContent);
                } catch (error) {
                    console.error(error);
                    alert(`檔案 [${file.name}] 傳送失敗：` + error.message);
                }
            }

            uploadStatus.classList.add('hidden');
            msgInput.disabled = false;
            msgInput.focus();
        }

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            await processFileUpload(e.target.files);
            e.target.value = ''; 
        });

        isFirstRender = true;
        initSSE(false);
    </script>
</body>
</html>
