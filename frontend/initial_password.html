<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>緊急密碼救援</title></head>
<body>
    <h3>緊急密碼救援</h3>
    <input type="text" id="empId" placeholder="輸入要重設的工號">
    <button onclick="doReset()">密碼重設</button>
    <div id="msg" style="margin-top:20px; color:red;"></div>

    <script>
        async function doReset() {
            const empId = document.getElementById('empId').value;
            const res = await fetch('/api/auth/initial_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ employee_id: empId })
            });
            const data = await res.json();
            document.getElementById('msg').innerText = data.message || data.error;
        }
    </script>
</body>
</html>
